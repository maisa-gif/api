name: Sync CNN agenda and transcripts

# Vercel Cron (see vercel.json) only fires once a day on the Hobby plan.
# This calls the same two endpoints far more often — free, since it just
# runs on GitHub's own scheduler and hits our already-deployed URLs.
#
# 30 minutes keeps this comfortably inside GitHub's free Actions minutes
# for a private repo (~1440 min/month used out of 2000 free). Every 15
# minutes would use ~2880 min/month, likely exceeding the free tier.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://api-ochre-ten-68.vercel.app
    steps:
      - name: Sync CNN agenda -> Google Calendar
        continue-on-error: true
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sf -H "Authorization: Bearer $CRON_SECRET" "$BASE_URL/api/cron/sync-agenda"

      - name: Sync Drive transcripts -> Bitrix24
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sf -H "Authorization: Bearer $CRON_SECRET" "$BASE_URL/api/cron/sync-transcripts"
